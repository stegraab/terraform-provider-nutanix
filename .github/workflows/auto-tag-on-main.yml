name: Auto Tag Release On Main

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags origin

      - name: Compute next release tag
        id: next_tag
        shell: bash
        run: |
          set -euo pipefail

          nearest_tag="$(git describe --tags --abbrev=0)"
          if [[ "$nearest_tag" =~ ^(v[0-9]+\.[0-9]+\.[0-9]+)(-stegra-[0-9]+)?$ ]]; then
            base_tag="${BASH_REMATCH[1]}"
          else
            echo "Nearest tag '$nearest_tag' is not in expected form vX.Y.Z or vX.Y.Z-stegra-N"
            exit 1
          fi

          if existing_for_commit=$(git tag --points-at "$GITHUB_SHA" | rg "^${base_tag}-stegra-[0-9]+$" | sort -V | tail -n1); then
            if [[ -n "$existing_for_commit" ]]; then
              echo "tag=$existing_for_commit" >> "$GITHUB_OUTPUT"
              echo "already_exists=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          max_n=0
          while IFS= read -r t; do
            n="${t##*-}"
            if [[ "$n" =~ ^[0-9]+$ ]] && (( n > max_n )); then
              max_n="$n"
            fi
          done < <(git tag -l "${base_tag}-stegra-*")

          next_n=$((max_n + 1))
          next_tag="${base_tag}-stegra-${next_n}"

          echo "tag=$next_tag" >> "$GITHUB_OUTPUT"
          echo "already_exists=false" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.next_tag.outputs.already_exists == 'false'
        env:
          TAG: ${{ steps.next_tag.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Automated release tag $TAG"
          git push origin "$TAG"

      - name: Tag already exists for commit
        if: steps.next_tag.outputs.already_exists == 'true'
        run: 'echo "Tag already exists on this commit: ${{ steps.next_tag.outputs.tag }}"'
